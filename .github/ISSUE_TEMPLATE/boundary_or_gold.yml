name: Boundary failure / gold case
description: The engine answered when it should have declined, refused when it had grounded evidence, or claimed "supported" while citing only hints.
labels: ["gold-case"]
body:
  - type: markdown
    attributes:
      value: |
        This is the most valuable thing you can file. The rule that comes with
        it (the one the repo holds itself to): the fix goes into the corpus, the
        scoring, or the prompt — **never** a special case for this one question.
        See [CONTRIBUTING](https://github.com/lukefwalton/answer-engine/blob/main/CONTRIBUTING.md)
        and [eval/README.md](https://github.com/lukefwalton/answer-engine/blob/main/eval/README.md).

        ⚠️ **A private-note leak is not a gold case — it's a security issue.** If
        private text actually reached an answer, that's the no-leak boundary
        failing: report it privately via
        [SECURITY.md](https://github.com/lukefwalton/answer-engine/blob/main/SECURITY.md),
        not here. This form is for **non-sensitive** grounding/decline
        regressions — please describe your corpus minimally and don't paste
        private content.
  - type: dropdown
    id: failure
    attributes:
      label: What broke?
      options:
        - Answered when it should have declined
        - Claimed "supported" while citing only hints (ungrounded)
        - Refused when it had grounded evidence to answer
        - Something else (non-sensitive — leaks go to SECURITY.md)
    validations:
      required: true
  - type: textarea
    id: query
    attributes:
      label: The question
      description: The exact query you asked.
    validations:
      required: true
  - type: textarea
    id: corpus
    attributes:
      label: Corpus shape
      description: What the engine was pointed at (your own corpus or the bundled example). Describe the shape — don't paste private content. If private text leaked into an answer, stop and use SECURITY.md instead of this form.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
      description: The behavior it should have had — the gold answer (cite / decline / route).
    validations:
      required: true
