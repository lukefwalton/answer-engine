name: release

# Intentional releases only — not on every green CI run.
# Each GitHub release can trigger a new Zenodo archive and citable DOI.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump from the latest v* tag
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      notes:
        description: Release notes (optional; shown on the GitHub release)
        required: false
        type: string

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Require main
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          if [ "$branch" != "main" ]; then
            echo "Release workflow must run on main (got: $branch)."
            exit 1
          fi

      - name: Verify baseline tag matches checked-in metadata
        id: baseline
        run: |
          latest="$(git tag -l 'v*' --sort=-v:refname | head -1)"
          if [ -z "$latest" ]; then
            echo "No v* tags found. Tag main to match checked-in metadata before running release."
            exit 1
          fi
          expected="${latest#v}"
          pkg="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json','utf8')).version")"
          zenodo="$(node -p "JSON.parse(require('node:fs').readFileSync('.zenodo.json','utf8')).version")"
          cff="$(node -p "require('node:fs').readFileSync('CITATION.cff','utf8').match(/^version: (.+)$/m)[1]")"
          for entry in "package.json:$pkg" ".zenodo.json:$zenodo" "CITATION.cff:$cff"; do
            file="${entry%%:*}"
            got="${entry#*:}"
            if [ "$got" != "$expected" ]; then
              echo "$file is $got but latest tag is $latest."
              echo "Repair metadata or cut a matching tag before releasing."
              exit 1
            fi
          done
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "expected=$expected" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: version
        run: |
          latest="${{ steps.baseline.outputs.latest }}"
          version="${latest#v}"
          IFS=. read -r major minor patch <<< "$version"
          case "${{ inputs.bump }}" in
            patch) patch=$((patch + 1)) ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            major) major=$((major + 1)); minor=0; patch=0 ;;
          esac
          next="${major}.${minor}.${patch}"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "tag=v${next}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync release metadata
        run: node scripts/sync-release-metadata.mjs "${{ steps.version.outputs.next }}"

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json .zenodo.json CITATION.cff
          git commit -m "chore(release): ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin main "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ${{ inputs.notes }}

            ---
            Archived on Zenodo after publish. Cite the [concept DOI](https://doi.org/10.5281/zenodo.20676773) for latest, or this release's version DOI to pin the snapshot.
          generate_release_notes: true
