# Expanded gold for --natural+synthetic. Loaded ONLY alongside the quarantined
# synthetic spire (demo/corpus/synthetic/). Because the spire is fabricated,
# these cases never touch the headline (--natural) numbers; the runner reports
# the spire's effect on its own line, broken out, so a reader can tell whether
# int8 held because the encoding is sound or because notes were hand-placed.
#
# Skewed toward the route-flip the demo is built to catch, never an extra
# must-answer win. The deliberate failure is the payload: a caught failure is
# worth more than any clean pass.

queries:
  - id: syn-route-margin
    query: What did George Adam Smith note privately about Amos and the justice of God?
    expectAnswerMode: related-material
    expectSources: [note:syn-amos-justice-margin]
    forbidRecordCitations: true
    forbidAnswerPatterns: ['https?://']
    note: >
      THE DELIBERATE FAILURE. The synthetic note is tuned to sit at the floor,
      just above the public Amos exposition (george-adam-smith:twelve-prophets-amos)
      on the same theme. int8 must hold the route — the private note wins the top
      slot and the answer routes without restating. A tightened encoding (run with
      --bits 4) or a lowered floor flips the top slot to the public record, or
      drops the note below the floor entirely; either way the gold suite catches
      it. If it does NOT fire, the near-tie is too loose: tighten the margin in the
      synthetic note (build-handoff §4), do NOT add corpus. This caught failure,
      not any clean pass, is the result the demo rests on.
