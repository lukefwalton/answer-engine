# The scaling-demo gold set (real-only, --natural).
#
# Same three-mode shape as the core gold set (eval/gold.yaml): questions the
# archive must answer, one it must route to a private note without restating,
# and one it must refuse. Tuned so the cases live where int8 rounding bites:
# near the score floor and near each other. A refuse case comfortably below the
# floor or a route case comfortably clear proves nothing about quantization;
# the marginal cases are the whole point.
#
# These run against demo/corpus/index.json (committed FP vectors), quantized
# in process. The harness (demo/run.ts) checks each case keylessly at the
# retrieval tier and, with --full and a key, the answer-mode tier too. Source
# ids are `${type}:${slug}` for records and `note:${slug}` for private notes,
# matching the corpus files in demo/corpus/ (see docs/scaling-demo/build-handoff.md).
#
# Queries name each Smith explicitly rather than using {{author}}, because the
# demo's whole subject is which Smith a question means.

queries:
  # ── Disambiguation: the economist ────────────────────────────────────────
  - id: econ-justice
    query: What did Adam Smith argue about justice and beneficence?
    expectAnswerMode: partial
    expectSources: [adam-smith:theory-of-moral-sentiments-justice]
    note: >
      Must resolve to the economist. George's Amos and Micah expositions carry
      the "justice" theme too, and his record titles contain "George Adam
      Smith" so the query's "Adam Smith" phrase-matches them for the exact-match
      boost. That mis-fire is the near-tie: int8 reordering is exactly what
      could tip this toward the wrong Smith.

  - id: econ-labour
    query: What did Adam Smith say about the division of labour?
    expectAnswerMode: partial
    expectSources: [adam-smith:wealth-of-nations-division-of-labour]
    note: >
      A cleaner economist hit — "division of labour" is unambiguously Wealth of
      Nations. Anchors the disambiguation against a case with little collision.

  # ── Disambiguation: the theologian ───────────────────────────────────────
  - id: george-amos
    query: What did George Adam Smith say about the prophet Amos and justice?
    expectAnswerMode: partial
    expectSources: [george-adam-smith:twelve-prophets-amos]
    note: >
      The parallel disambiguation, the other way. "justice" appears for both
      Smiths, but "the prophet Amos" plus George's full name should carry this
      to George. The symmetric twin of econ-justice.

  - id: george-isaiah
    query: Where does George Adam Smith write about faith in the book of Isaiah?
    expectAnswerMode: partial
    expectSources: [george-adam-smith:isaiah-prophet-of-faith]
    note: >
      Theme-and-subject query carried mostly by semantic similarity; "Isaiah"
      and "faith" are George's, with no economist competitor.

  # ── The partial-name boost edge ──────────────────────────────────────────
  - id: boost-edge-micah
    query: What did Adam Smith say about the prophet Micah?
    expectAnswerMode: partial
    expectSources: [george-adam-smith:twelve-prophets-micah]
    note: >
      The boost edge case. The query names "Adam Smith" (the economist) but asks
      about Micah (George's subject). EXACT_MATCH_BOOST (0.30) fires on the
      partial name match against George's title, AND Micah is George's alone, so
      the intended answer is George's Micah exposition despite the economist's
      name in the query. Pin the observed behavior here; int8 reordering near
      this collision is precisely the kind of thing that could tip it.

  # ── Route: answered by the boundary ──────────────────────────────────────
  - id: route-forgiveness
    query: How did George Adam Smith preach on the forgiveness of sins?
    expectAnswerMode: related-material
    expectSources: [note:forgiveness-of-sins]
    forbidRecordCitations: true
    forbidAnswerPatterns: ['https?://']
    note: >
      Only the private sermon bears on this. The note must win the top slot over
      the public George records on adjacent themes, and the answer must route to
      the page-and-locator WITHOUT restating what the sermon says — the mode is
      related-material, never a paraphrase of the private text. This tests route
      SELECTION (which note wins), not A2: int8 never touches the answer model's
      confabulation residue.

  # ── Refuse: nothing clears the floor ─────────────────────────────────────
  - id: refuse-quantum
    query: What did Adam Smith think about quantum computing?
    expectAnswerMode: not-found
    forbidSources:
      [adam-smith:theory-of-moral-sentiments-justice, adam-smith:wealth-of-nations-division-of-labour, george-adam-smith:twelve-prophets-amos, george-adam-smith:isaiah-prophet-of-faith]
    note: >
      A subject no Smith addressed, three centuries out of reach. The score
      floor must keep every record out of the evidence and the answer must be a
      plain not-found. A refuse case is only worth having if it sits where a
      lowered floor or a coarser encoding could let a weak hit cross.
