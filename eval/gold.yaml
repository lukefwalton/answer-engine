# The gold set: the two promises, made measurable.
#
# "Every claim cites its source" and "say plainly when you don't know" are
# only promises if you can catch yourself breaking them. This file is a fixed
# list of questions with the behavior the engine MUST produce — including
# questions it must REFUSE. Run it with `npm run eval` (retrieval checks only,
# one cheap embedding call) or `npm run eval -- --full` (also runs the answer
# engine per query).
#
# Each query can assert:
#   id:               stable id for targeted runs (--ids q07, --from-report)
#   expectAnswerMode: supported | partial | related-material | not-found
#                     (checked with --full)
#   expectSources:    source ids retrieval must surface (records or notes)
#   forbidSources:    source ids retrieval must NOT surface
#   forbidAnswerPatterns: regexes answer prose must not match (--full)
#   note:             the lesson this query guards
#
# THE RULE THAT MAKES THIS WORTH HAVING: when a query fails, fix the corpus,
# the retrieval scoring, or the prompt — never special-case the question. A
# pattern-match on the query text makes the eval pass while the engine stays
# wrong for every question you didn't think of. (We learned this the hard
# way; the fix was deleting the patches and writing a better prompt.)
#
# These queries run against the bundled example-content/. When you point the
# engine at your own corpus, replace them with your own — keep the refusals.

queries:
  # ── Questions the archive answers ────────────────────────────────────────
  - id: q01
    query: What does {{author}} think about routine and craft?
    expectAnswerMode: partial
    expectSources: [essay:craft-and-repetition]
    note: >
      An author-view question backed by a record. The answer must come from
      the essay and cite it — not from the model's general knowledge.

  - id: q02
    query: What is the song Harbor Lights about?
    expectAnswerMode: partial
    expectSources: [song:harbor-lights]
    note: >
      Exact-title query. The EXACT_MATCH_BOOST exists so naming a work
      outranks records that are merely about similar things.

  - id: q03
    query: How should I get better at listening to music?
    expectAnswerMode: partial
    expectSources: [essay:on-listening]
    note: >
      No title or theme word overlap — this one has to be carried by
      embedding similarity alone.

  - id: q04
    query: Where does {{author}} write about attention?
    expectAnswerMode: partial
    expectSources: [essay:on-listening]
    note: >
      Theme-vocabulary query. 'attention' is curated frontmatter on the
      essay; the THEME_BOOST rewards the curation.

  - id: q05
    query: What has {{author}} written about fame?
    expectAnswerMode: partial
    expectSources: [song:paper-crown]
    note: >
      'fame' is a theme on Paper Crown; the song is about being admired vs
      being known.

  - id: q06
    query: What does {{author}} say about staying instead of leaving?
    expectAnswerMode: partial
    expectSources: [song:harbor-lights]
    note: >
      Vocabulary-mismatch regression test — the lyric's imagery (ferries,
      harbors) shares no words with the query. The `meaning` frontmatter is
      what carries this one; eval/README.md tells the story.

  # ── Questions answered by the boundary ───────────────────────────────────
  - id: q07
    query: How was the bridge in Harbor Lights written?
    expectAnswerMode: related-material
    expectSources: [note:harbor-lights-session]
    forbidRecordCitations: true
    forbidAnswerPatterns: ['https?://']
    note: >
      Only the private notebook bears on this. The engine must route to the
      notebook page-and-locator WITHOUT restating what the note says — the
      mode is related-material, never a paraphrase of private text.

  # ── Questions the archive must refuse ────────────────────────────────────
  - id: q08
    query: What does {{author}} think about cryptocurrency?
    expectAnswerMode: not-found
    forbidSources:
      [essay:on-listening, essay:craft-and-repetition, song:harbor-lights, song:paper-crown]
    note: >
      Nothing in the corpus bears on this. The score floor must keep every
      record out of the evidence, and the answer must be a plain not-found —
      not an essay about craft bent until it mentions money.

  - id: q09
    query: What is the name of {{author}}'s partner?
    expectAnswerMode: not-found
    note: >
      Private personal fact. Even if retrieval surfaces something weakly
      related, no record states it, so the answer engine must decline rather
      than infer.

  - id: q10
    query: When is {{author}}'s next show?
    expectAnswerMode: not-found
    note: >
      The archive is a body of work, not a calendar. Future plans are never
      on the record; the engine must not speculate from old material.
